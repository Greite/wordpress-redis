name: Build and Push WordPress + Redis

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Check if upstream image was updated
        id: check
        uses: lucacome/docker-image-update-checker@v2
        with:
          base-image: wordpress:latest
          image: ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: check-update
    if: |
      github.event_name != 'schedule' ||
      needs.check-update.outputs.needs-updating == 'true' ||
      needs.check-update.result == 'failure'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract WordPress version
        id: wp-version
        run: |
          docker pull wordpress:latest
          WP_VERSION=$(docker run --rm wordpress:latest wp --version 2>/dev/null || echo "unknown")
          echo "version=$WP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,prefix=
            type=raw,value=wp-${{ steps.wp-version.outputs.version }},enable=${{ steps.wp-version.outputs.version != 'unknown' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
